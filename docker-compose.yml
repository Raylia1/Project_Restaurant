services:

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: restaurant_db

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql-db

  api:
    image: raylia/restaurant-api:latest
    container_name: flask-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  frontend:
    image: raylia/project_restaurant:latest
    container_name: restaurant
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api