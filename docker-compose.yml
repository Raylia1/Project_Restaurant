services:

  frontend:
    image: raylia/project_restaurant:latest
    container_name: restaurant
    restart: unless-stopped
    ports:
      - "80:80"

  api:
    image: raylia/restaurant-api:latest
    container_name: flask-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: restaurant_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: